name: Agent Drift Check

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'agents/_base.tmpl'

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check agent SKILL.md drift
        run: |
          chmod +x scripts/check-drift.sh
          scripts/check-drift.sh
